# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# Note: unique combination of 'package-ecosystem', 'directory', and 'target-branch'

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    labels:
      - "dependabot :robot:"
    schedule:
      interval: weekly # on monday
      time: '09:30'
      timezone: Europe/Zurich
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nix
    directory: /
    labels:
      - "dependabot :robot:"
    schedule:
      interval: weekly # on monday
      time: '09:30'
      timezone: Europe/Zurich
    # Bundle all flake inputs (nixpkgs, …) into a single PR so the lock file is
    # updated once per run instead of one PR per input.
    groups:
      flake:
        patterns:
          - "*"
