documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'

feature:
  - head-branch: ['^feature', 'feature']

release:
  - all:
    - base-branch: 'master'
    - head-branch: ['^release', 'release']

nix:
  - changed-files:
    - any-glob-to-any-file:
        - 'flake.nix'
        - 'flake.lock'
        - 'versions.json'

ci:
  - changed-files:
    - any-glob-to-any-file:
        - '.github/workflows/**'
        - '.github/scripts/**'
        - '.github/dependabot.yml'
        - '.github/labeler.yml'

java:
  - changed-files:
    - any-glob-to-any-file: '.github/check-outdated/**'
