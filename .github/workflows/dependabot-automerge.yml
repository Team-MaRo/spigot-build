name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest

    # Checking the actor will prevent your Action run failing on non-Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'Team-MaRo/spigot-build'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch Dependabot metadata 🔍
        uses: dependabot/fetch-metadata@v3
        id: metadata
        with:
          github-token: ${{ github.token }}

      - name: Approve Dependabot PR if not already approved ✅
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Approve as the GH_PAT user (a member of @Team-MaRo/CI, a code owner on
          # Dependabot-managed paths in .github/CODEOWNERS) so this approval
          # satisfies the code-owner review requirement. github.token approves as
          # github-actions[bot], which is not a code owner and wouldn't count.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr checkout "$PR_URL" # sets the upstream metadata for `gh pr status`
          if [ "$(gh pr status --json reviewDecision -q .currentBranch.reviewDecision)" != "APPROVED" ]; then
            gh pr review --approve "$PR_URL"
          else
            echo "PR already approved, skipping additional approvals to minimize emails/notification noise."
          fi

      - name: Enable auto-merge for Dependabot PR 🪄
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # GITHUB_TOKEN is fine here: Dependabot PRs target `develop` and no
          # workflow keys off a develop push, so there's no downstream run to fire
          # (which would otherwise need a PAT).
          GITHUB_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --merge "$PR_URL"
